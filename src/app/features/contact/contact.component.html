<section id="contact" class="section contact-section">
  <div class="container">
    <app-section-heading
      title="Contact Me"
      subtitle="Get in touch via Email or WhatsApp."
    ></app-section-heading>
    <div class="contact-wrapper">
      <div class="contact-card">
        <div class="card-icon"><i class="bx bx-envelope"></i></div>
        <h3>Email</h3>
        <a [href]="'mailto:' + contact.email">{{ contact.email }}</a>
      </div>
      <div class="contact-card">
        <div class="card-icon"><i class="bx bxl-whatsapp"></i></div>
        <h3>WhatsApp</h3>
        <a [href]="contact.whatsapp.url" target="_blank" rel="noopener noreferrer">{{
          contact.whatsapp.display
        }}</a>
      </div>
    </div>
  </div>
</section>
