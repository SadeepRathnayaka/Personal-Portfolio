<section id="projects" class="section projects-section">
  <div class="container">
    <app-section-heading title="Projects"></app-section-heading>

    <div class="project-categories" role="tablist" aria-label="Project categories">
      <button
        *ngFor="let cat of categories"
        type="button"
        class="category-btn"
        [class.active]="activeCategory === cat.id"
        (click)="setCategory(cat.id)"
        role="tab"
        [attr.aria-selected]="activeCategory === cat.id"
      >
        {{ cat.label }}
      </button>
    </div>

    <div class="projects-showcase">
      <app-project-card
        *ngFor="let project of displayProjects"
        [project]="project"
      ></app-project-card>
    </div>
  </div>
</section>
